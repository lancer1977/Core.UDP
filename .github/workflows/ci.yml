name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Core.UDP.sln

      - name: Build
        run: dotnet build Core.UDP.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Core.UDP.sln --configuration Release --no-restore --no-build --verbosity normal
